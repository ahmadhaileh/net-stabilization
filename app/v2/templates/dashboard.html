<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Grid Stabilization v2</title>
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>

<header>
  <h1>
    <span id="state-dot" class="status-dot dot-gray"></span>
    Grid Stabilization v2
  </h1>
  <div class="header-stats">
    <div class="stat">
      <div class="stat-val" id="h-state">—</div>
      <div class="stat-lbl">State</div>
    </div>
    <div class="stat">
      <div class="stat-val" id="h-power">0 kW</div>
      <div class="stat-lbl">Power</div>
    </div>
    <div class="stat">
      <div class="stat-val" id="h-target">—</div>
      <div class="stat-lbl">Target</div>
    </div>
    <div class="stat">
      <div class="stat-val" id="h-miners">0/0</div>
      <div class="stat-lbl">Mining</div>
    </div>
    <div class="stat">
      <span id="conn-status" style="font-size:11px; color:var(--text2)">Connecting…</span>
    </div>
  </div>
</header>

<main>
  <!-- Controls -->
  <div class="card">
    <div class="controls">
      <input type="number" id="power-input" class="power-input" placeholder="kW" min="0" step="10" value="110">
      <button class="btn btn-green" id="btn-activate">Activate</button>
      <button class="btn btn-red" id="btn-deactivate">Deactivate</button>
    </div>
  </div>

  <!-- Overview -->
  <div class="card">
    <div class="card-title">Fleet Overview</div>
    <div class="overview">
      <div class="metric accent"><div class="val" id="m-active">0</div><div class="lbl">Active kW</div></div>
      <div class="metric"><div class="val" id="m-target">0</div><div class="lbl">Target kW</div></div>
      <div class="metric"><div class="val" id="m-rated">0</div><div class="lbl">Rated kW</div></div>
      <div class="metric"><div class="val" id="m-measured">—</div><div class="lbl">Meter kW</div></div>
      <div class="metric"><div class="val" id="m-mining" style="color:var(--green)">0</div><div class="lbl">Mining</div></div>
      <div class="metric"><div class="val" id="m-waking" style="color:var(--yellow)">0</div><div class="lbl">Waking</div></div>
      <div class="metric"><div class="val" id="m-idle">0</div><div class="lbl">Idle</div></div>
      <div class="metric"><div class="val" id="m-voltage">—</div><div class="lbl">Voltage</div></div>
    </div>
    <div class="power-bar-container" style="margin-top:12px">
      <div class="power-bar-bg">
        <div class="power-bar-fill" id="power-fill" style="width:0%"></div>
        <div class="power-bar-target" id="power-target" style="left:0%"></div>
      </div>
      <div class="power-bar-labels">
        <span id="pb-actual">0 kW</span>
        <span id="pb-rated">0 kW</span>
      </div>
    </div>
  </div>

  <!-- Sections -->
  <div class="card">
    <div class="card-title">Sections</div>
    <div class="sections" id="sections"></div>
  </div>

  <!-- Miner Grid -->
  <div class="card">
    <div class="card-title">Miners</div>
    <div class="miner-grid" id="miner-grid"></div>
  </div>
</main>

<div class="tooltip" id="tooltip"></div>

<script src="/static/js/dashboard.js"></script>
</body>
</html>
